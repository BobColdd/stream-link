<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 LiveKick - Live Football Streaming</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div>
                    <h1>🏆 LiveKick</h1>
                    <p class="date">{{ today.strftime('%A, %B %d, %Y') }}</p>
                </div>
                <a href="{{ url_for('live_matches') }}" class="btn btn-live">
                    🔴 Live Matches
                </a>
            </div>
        </header>

        <div class="competitions-grid">
            {% for comp in competitions %}
            <a href="{{ url_for('competition_matches', code=comp.code) }}" class="competition-card">
                <div class="card-content">
                    <div class="emblem-container">
                        {% if comp.emblem %}
                        <img src="{{ comp.emblem }}" alt="{{ comp.name }}" class="emblem">
                        {% else %}
                        <div class="emblem-placeholder">{{ comp.icon }}</div>
                        {% endif %}
                    </div>
                    <h3>{{ comp.name }}</h3>
                    <p class="season">{{ comp.season or 'Current Season' }}</p>
                </div>
            </a>
            {% endfor %}
        </div>

        <footer>
            <p>Data source: football-data.org & ESPN</p>
        </footer>
    </div>
</body>
</html>
