services:
  - type: web
    name: livekick-flask-web
    env: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BACKEND_URL
        value: https://colddfootball.neckhards.org
      - key: PORT
        value: 10000
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: CACHE_DURATION
        value: 30
    healthCheckPath: /health
    autoDeploy: true
