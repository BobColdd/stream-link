<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream - LiveKick</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container stream-container">
        <div class="back-nav">
            <a href="javascript:history.back()" class="back-btn">← Back</a>
        </div>

        <h1>📺 Match Stream</h1>

        {% if streams %}
        <div class="stream-selector">
            <h3>Available Streams ({{ streams|length }})</h3>
            <div class="stream-buttons">
                {% for stream in streams %}
                <button class="stream-btn" data-url="{{ stream }}" onclick="playStream(this)">
                    ▶ Stream {{ loop.index }}
                </button>
                {% endfor %}
            </div>
        </div>

        <div class="player-container">
            <video id="video-player" controls autoplay class="video-player">
                Your browser does not support video playback.
            </video>
            <div class="player-overlay" id="player-overlay">
                <div class="loading-spinner">Loading stream...</div>
            </div>
        </div>
        {% else %}
        <div class="no-matches">
            <div class="no-matches-icon">😕</div>
            <p>No streams available for this match</p>
        </div>
        {% endif %}

        <script src="https://cdn.jsdelivr.net/npm/hls.js@0.14.17/dist/hls.min.js"></script>
        <script>
            let hls = null;
            const video = document.getElementById('video-player');
            const overlay = document.getElementById('player-overlay');

            function playStream(button) {
                const url = button.getAttribute('data-url');
                
                // Remove active class from all buttons
                document.querySelectorAll('.stream-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                button.classList.add('active');
                
                // Show loading
                overlay.style.display = 'flex';
                
                // Clear previous HLS instance
                if (hls) {
                    hls.destroy();
                    hls = null;
                }
                
                // Check if HLS is supported
                if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // Native HLS (Safari)
                    video.src = url;
                    video.addEventListener('loadedmetadata', () => {
                        overlay.style.display = 'none';
                    });
                } else if (Hls.isSupported()) {
                    // HLS.js
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                    });
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        overlay.style.display = 'none';
                        video.play();
                    });
                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            overlay.innerHTML = '<div class="error-message">⚠️ Failed to load stream. Please try another stream.</div>';
                        }
                    });
                } else {
                    overlay.innerHTML = '<div class="error-message">⚠️ HLS is not supported in this browser</div>';
                }
            }

            // Auto-play first stream if available
            {% if streams %}
            document.addEventListener('DOMContentLoaded', () => {
                const firstBtn = document.querySelector('.stream-btn');
                if (firstBtn) {
                    playStream(firstBtn);
                }
            });
            {% endif %}
        </script>
        <style>
            .stream-container {
                max-width: 900px;
            }
            .stream-selector {
                background: white;
                border-radius: 12px;
                padding: 20px;
                margin-bottom: 20px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            }
            .stream-selector h3 {
                margin-bottom: 12px;
                color: #1a73e8;
            }
            .stream-buttons {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
            }
            .stream-btn {
                padding: 10px 20px;
                background: #f5f7fa;
                border: 2px solid #e8eaed;
                border-radius: 8px;
                cursor: pointer;
                font-weight: 500;
                transition: all 0.2s;
            }
            .stream-btn:hover {
                background: #e8eaed;
                border-color: #1a73e8;
            }
            .stream-btn.active {
                background: #1a73e8;
                color: white;
                border-color: #1a73e8;
            }
            .player-container {
                background: black;
                border-radius: 12px;
                overflow: hidden;
                position: relative;
            }
            .video-player {
                width: 100%;
                max-height: 500px;
                background: black;
            }
            .player-overlay {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(0,0,0,0.7);
                color: white;
                font-size: 1.2rem;
            }
            .loading-spinner {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .loading-spinner::before {
                content: '';
                width: 24px;
                height: 24px;
                border: 3px solid rgba(255,255,255,0.3);
                border-top: 3px solid white;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
            .error-message {
                color: #ff1744;
                background: rgba(255,23,68,0.1);
                padding: 20px;
                border-radius: 8px;
            }
        </style>
    </div>
</body>
</html>
